    }
    async function emptyJoin(){
      const n = $("emptyNameInput")?.value || "Jugador";
      const r = $("emptyRoomInput")?.value || "BRUMA";
      const m = $("emptyModeInput")?.value || "duel";
      $("nameInput").value = n;
      $("roomInput").value = r;
      $("modeInput").value = m;
      await join();
    }
    async function emptyCreate(){
      await emptyJoin();
      newGame();
    }
    function addLocalPlayer(){
      const r = $("emptyRoomInput")?.value || room || "BRUMA";
      const names = ["Jugador2","Jugador3","Jugador4"];
      // Pick a name not already in presence
      const usedNames = presence.map(p=>p.name);
      const nextName = names.find(n=>!usedNames.includes(n)) || "Jugador" + (presence.length+1);
      const url = new URL(window.location.href);
      url.searchParams.set("nombre", nextName);
      url.searchParams.set("sala", r.toUpperCase());
      window.open(url.toString(), "_blank");
    }
    function renderPlayers(){
      $("players").innerHTML = state.players.map(p => `
        <div class="player ${activePlayer()?.id===p.id?"active":""} ${p.dead?"dead":""}">
          <div class="row between"><b style="color:${p.color}">${esc(p.name)}</b><span>${p.health}/40 ${state.target===p.id?"Objetivo":""}</span></div>
          ${p.character ? `<div class="character"><img class="portrait" alt="" src="${characterArt(p.character)}"><div><b>${esc(p.character.name)}</b><div class="tiny">${esc(p.character.text)}</div></div></div>` : ""}
          ${trainingHtml(p)}
          <div class="bars"><div class="bar"><span style="width:${p.health/40*100}%"></span></div></div>
          <div class="tiny">Mazo ${p.deck.length} | Mano ${p.hand.length} | Descarte ${p.discard.length} | Entreno ${p.training}/11 | Quemar ${burnLimit(p)}</div>
          ${state.mode !== "lord" && isMyTurn() && p.id!==activePlayer().id && !p.dead ? `<button onclick="attackPlayer('${p.id}')">Atacar jugador</button>` : ""}
          ${p.allies.map(a => `<button onclick="attackAlly('${p.id}','${a.uid}')">Atacar ${esc(a.name)} (${a.defense})</button>`).join(" ")}
          ${renderAdversaries(p)}
        </div>`).join("");
    }
    function renderAdversaries(p){
      if(state.mode !== "lord" || !p.adversaries?.length) return "";
      return `<div class="trainingPerks"><b class="tiny">Adversarios</b>${p.adversaries.map((a,i) => {
        const next = a.shields[a.hit || 0];
        const cost = next === "X" ? state.lord.dominance : next;
        const shields = a.shields.map((s,idx)=> idx < (a.hit||0) ? "■" : (s === "X" ? `X(${state.lord.dominance})` : s)).join(" ");
        return `<div class="player" style="margin-top:4px"><b>${esc(a.name)}</b><div class="tiny">${esc(a.text)}</div><div class="tiny">Escudos: ${shields}</div>${isMyTurn()?`<button onclick="attackAdversary('${p.id}',${i})">Romper escudo (${cost})</button>`:""}</div>`;
      }).join("")}</div>`;
    }
    function trainingHtml(p){
      const steps = Array.from({length:11}, (_,i) => `<span class="trainingStep ${p.training >= i+1 ? "on" : ""}"></span>`).join("");
      const perks = (p.character?.training || []).map(perk =>
        `<div class="perk ${p.training >= perk.at ? "on" : ""}">${p.training >= perk.at ? "✓" : "·"} ${perk.at}: ${esc(perk.name)} - ${esc(perk.text)}</div>`
      ).join("");
      return `<div class="tiny" style="margin-top:6px"><b>Entrenamiento</b> ${p.training}/11</div><div class="trainingLine">${steps}</div><div class="trainingPerks">${perks}</div>`;
    }
    function renderLord(){
      if(state.mode !== "lord" || !state.lord){
        $("lordPanel").innerHTML = "Modo competitivo.";
        return;
      }
      const l = state.lord;
      const currentDominance = dominanceTrack[l.dominance - 1] || dominanceTrack[0];
      const nextDominance = dominanceTrack[l.dominance] || null;
      $("lordPanel").innerHTML = `
        <div class="row between"><b>Lord Legislador</b><span>${l.health}/${l.maxHealth}</span></div>
        <div class="bar"><span style="width:${(l.health/l.maxHealth)*100}%;background:#c44d3d"></span></div>
        <div class="row between" style="margin-top:6px"><span>Dominancia</span><span>${l.dominance}/${l.maxDominance}</span></div>
        <div class="bar"><span style="width:${(l.dominance/l.maxDominance)*100}%;background:#d2a449"></span></div>
        <div class="player" style="margin-top:8px;padding:7px">
          <b>Efecto actual</b>
          <div class="tiny">${esc(currentDominance.text)}</div>
          ${nextDominance ? `<div class="tiny" style="margin-top:5px"><b>Siguiente:</b> ${esc(nextDominance.text)}</div>` : ""}
        </div>
        <div class="tiny" style="margin-top:6px">Mazo del Lord: ${l.deck.length} | Descarte: ${l.discard.length}</div>
        ${isMyTurn() ? `<button style="margin-top:8px" onclick="attackPlayer('lord')">Atacar al Lord</button>` : ""}
        <div class="tiny" style="margin-top:6px">Si el mazo del Lord se agota o todos caen, gana el Imperio. X = Dominancia actual.</div>`;
    }
    function renderMissions(){
      $("missions").innerHTML = state.missions.map((m,i) => {
        const rows = state.players.map(p => `<div class="tiny">${esc(p.name)}: ${m.pos[p.id] || 0}/12</div><div class="bar"><span style="width:${((m.pos[p.id]||0)/12)*100}%;background:${p.color}"></span></div>`).join("");
        const rewardRows = [4,8,12].map(mark => `<span class="pill">${mark}: ${esc(effectSummary(m.rewards[mark]))}</span>`).join(" ");
        return `<div class="player mission"><b>${esc(m.name)}</b>${rows}<div class="row" style="margin-top:6px">${rewardRows}</div>${isMyTurn() ? `<button onclick="allocateMission(${i})">Asignar 1 punto</button>` : ""}</div>`;
      }).join("");
    }
    function renderMetals(){
      const p = viewedPlayer();
      if(!p){ $("metals").innerHTML = ""; return; }
      const isMe = p.id === clientId;
      $("metals").innerHTML = METALS.map(m => {
        const x = p.metals[m];
        const status = x.flared ? "Avivado: no disponible hasta refrescarlo." : x.used ? "Usado este turno." : "Disponible.";
        return `<button class="metal ${x.used?"used":""} ${x.flared?"flared":""}" ${isMe?`onclick="refreshMetal('${m}')"`:'disabled'} title="${status}">${es(m)}</button>`;
      }).join("");
    }
    function renderCards(){
      const p = viewedPlayer();
      $("market").innerHTML = state.market.map((c,i)=> c ? cardHtml(c, "market", i) : "").join("");
      $("handCards").innerHTML = p ? p.hand.map(c=>cardHtml(c, p.id===clientId?"hand":"view")).join("") : "";
      $("playCards").innerHTML = p ? p.play.map(c=>cardHtml(c, p.id===clientId?"play":"view")).join("") : "";
      $("allyCards").innerHTML = p ? p.allies.map(c=>cardHtml(c, p.id===clientId?"allies":"view")).join("") : "";
      $("discardCards").innerHTML = p ? p.discard.map(c=>cardHtml(c,"discard")).join("") : "";
      $("trashCards").innerHTML = state.eliminated.map(c=>cardHtml(c,"trash")).join("");
      $("deckStack").innerHTML = p ? deckStackHtml(p.deck.length) : "";
      $("deckCount").textContent = p ? `${p.deck.length} carta${p.deck.length===1?"":"s"}` : "0";
      $("handCount").textContent = p ? `${p.hand.length}` : "0";
      $("playCount").textContent = p ? `${p.play.length}` : "0";
      $("allyCount").textContent = p ? `${p.allies.length}` : "0";
      $("discardCount").textContent = p ? `${p.discard.length}` : "0";
      $("trashCount").textContent = `${state.eliminated.length}`;
    }
    function deckStackHtml(count){
      const n = Math.min(6, Math.max(0, count));
      const backs = Array.from({length:n}, (_,i) => {
        const offset = i - Math.floor(n/2);
        return `<div class="deckBack" style="transform:translate(${offset*3}px,${offset*-2}px) rotate(${offset*1.5}deg);z-index:${i}"></div>`;
      }).join("");
      return `${backs}<div class="deckMeta">${count} cartas</div>`;
    }
    function cardHtml(c, zone, i=0){
      const klass = `card ${c.type} ${c.asMetal?"metaluse":""}`;
      let mainButtons = "";
      let vialAction = "";
      if(zone==="hand" && isMyTurn()){
        mainButtons += `<button onclick="playCard('${c.uid}')">${c.type === "action" ? "Preparar" : "Jugar"}</button>`;
        if(c.type==="action") vialAction = `useAsMetal('${c.uid}')`;
        for(const m of METALS) if(c.pair?.includes(m)) mainButtons += `<button onclick="discardToRefresh('${c.uid}','${m}')">Ref ${es(m)}</button>`;
        if(activePlayer().turn.trashOwn>0) mainButtons += `<button class="danger" onclick="trashOwn('${c.uid}','hand')">Eliminar</button>`;
      }
      if(zone==="play" && isMyTurn() && c.type==="action" && !c.activated && !c.asMetal){
        const p = activePlayer();
        mainButtons += `<button onclick="activate('${c.uid}','normal')" ${canPayMetal(p,c.need,"normal") ? "" : "disabled"}>Quemar</button>`;
        mainButtons += `<button onclick="activate('${c.uid}','flare')" ${canPayMetal(p,c.need,"flare") ? "" : "disabled"}>Forzar</button>`;
        mainButtons += `<button onclick="activate('${c.uid}','atium')" ${canPayMetal(p,c.need,"atium") ? "" : "disabled"}>Atium</button>`;
        mainButtons += `<button onclick="unprepareCard('${c.uid}')">Desprep.</button>`;
        vialAction = `preparedAsMetal('${c.uid}')`;
        if(activePlayer().turn.trashOwn>0) mainButtons += `<button class="danger" onclick="trashOwn('${c.uid}','play')">Eliminar</button>`;
      }
      if(zone==="market" && isMyTurn()){
        mainButtons += `<button onclick="buy(${i})">Comprar</button>`;
        if(activePlayer().turn.trashMarket>0) mainButtons += `<button class="danger" onclick="trashMarket(${i})">Empujar</button>`;
      }
      if(zone==="discard" && isMyTurn()){
        if(activePlayer().turn.trashOwn>0) mainButtons += `<button class="danger" onclick="trashOwn('${c.uid}','discard')">Eliminar</button>`;
        if(activePlayer().turn.pull>0) mainButtons += `<button onclick="pullDiscard('${c.uid}')">Al mazo</button>`;
      }
      const metalLabel = displayMetal(c);
      const cost = zone === "market" || c.cost ? `<span class="costBadge">${c.cost || 0}</span>` : "";
      return `<article class="${klass}">
        <div class="titleBar">${esc(c.name)}${cost}</div>
        <div class="artWrap">
          <img class="art" alt="" src="${cardArt(c)}">
          <span class="metalRibbon">${esc(metalLabel)}</span>
          ${vialAction ? `<button class="vialChip" onclick="${vialAction}" title="Usar como vial de metal">${esc(shortVial(c.pair?.map(es).join("/") || "Metal"))}</button>` : ""}
        </div>
        <div class="cardBody">
          <div class="meta">
            <span class="tag">${es(c.type)}</span>${c.need?`<span class="tag">requiere ${es(c.need)}</span>`:""}${c.defense?`<span class="tag">def ${c.defense}</span>`:""}
          </div>
          <div class="icons">${effectIcons(c)}</div>
          <div class="text">${esc(c.text || "")}</div>
          ${powerInfo(c)}
        </div>
        <div class="actions">${cardControls(c, mainButtons)}</div>
      </article>`;
    }
    function shortVial(label){
      return String(label).split("/").map(x => x.trim().slice(0,2)).join("/");
    }
    function cardControls(c, mainButtons){
      if(!mainButtons) return "";
      return `<div class="cardControls">
        <div class="mainControls">${mainButtons}</div>
      </div>`;
    }
    function powerInfo(c){
      if(c.type !== "action") return "";
      const rows = [];
      if(c.extraNeed && c.extra) rows.push(`<div class="powerRow"><strong>+ ${es(c.extraNeed)}</strong><span>${effectSummary(c.extra)}</span></div>`);
      if(c.confrontation) rows.push(`<div class="powerRow"><strong>4 Atium</strong><span>victoria inmediata</span></div>`);
      if(!rows.length && c.pair) rows.push(`<div class="powerRow"><strong>Vial</strong><span>${c.pair.map(es).join(" / ")}</span></div>`);
      return `<div class="powerBox">${rows.join("")}</div>`;
    }
    function displayMetal(c){
      if(c.need) return es(c.need);
      if(c.metal) return es(c.metal);
      if(c.pair) return c.pair.map(es).join("/");
      if(c.type === "funding") return "Moneda";
      return es(c.type);
    }
    function effectIcons(c){
      const bits = [];
      if(c.type === "funding") bits.push(iconWithCount("coin", 1));
      if(c.type === "ally" && c.defender) bits.push(icon("defender", "Defensor"));
      collectEffectIcons(bits, c.eff || {});
      if(c.extra) collectEffectIcons(bits, c.extra);
      if(c.extraNeed) bits.push(icon("slash", "Requiere otro metal"));
      if(c.need) bits.push(icon("burn", `Quemar ${es(c.need)}`));
      if(c.confrontation) bits.push(iconWithCount("atium", 4));
      return bits.join("");
    }
    function collectEffectIcons(bits, eff){
      if(eff.combat) bits.push(iconWithCount("combat", eff.combat));
      if(eff.mission) bits.push(iconWithCount("mission", eff.mission));
      if(eff.heal) bits.push(iconWithCount("heal", eff.heal));
      if(eff.coin) bits.push(iconWithCount("coin", eff.coin));
      if(eff.train) bits.push(iconWithCount("train", eff.train));
      if(eff.draw) bits.push(iconWithCount("draw", eff.draw));
      if(eff.refreshAny) bits.push(iconWithCount("refresh", eff.refreshAny));
      if(eff.trashOwn || eff.trashMarket) bits.push(iconWithCount("trash", (eff.trashOwn || 0) + (eff.trashMarket || 0)));
      if(eff.burn) bits.push(iconWithCount("burnExtra", eff.burn));
      if(eff.atium) bits.push(iconWithCount("atium", eff.atium));
      if(eff.dominance) bits.push(iconWithCount("dominance", eff.dominance));
    }
    function iconWithCount(kind, n){
      return `${icon(kind)}${n && n !== 1 ? `<span class="icoText">x${n}</span>` : ""}`;
    }
    function icon(kind, title=""){
      const svgs = {
        train:`<path d="M5 16h14l-3-9H8z" fill="#222"/><path d="M7 16l-3 4M11 16l-1 4M15 16l1 4M19 16l3 4" stroke="#222" stroke-width="2" stroke-linecap="round"/><path d="M8 7h8l-1-4H9z" fill="#39464a"/>`,
        combat:`<path d="M4 4l16 16M20 4L4 20" stroke="#a9252e" stroke-width="5" stroke-linecap="round"/><path d="M4 4l16 16M20 4L4 20" stroke="#301014" stroke-width="2" stroke-linecap="round"/>`,
        mission:`<rect x="5" y="3" width="14" height="18" rx="2" fill="#eadcb1" stroke="#6b5940" stroke-width="2"/><path d="M8 7h8M8 11h8" stroke="#d2a449" stroke-width="1.5"/>`,
        heal:`<path d="M9 3h6v6h6v6h-6v6H9v-6H3V9h6z" fill="#75b84a" stroke="#477431" stroke-width="1.5"/>`,
        coin:`<circle cx="12" cy="12" r="9" fill="#c5a24f" stroke="#81651f" stroke-width="2"/><path d="M7 10c3-3 7-3 10 0" stroke="#ead384" stroke-width="2" fill="none"/>`,
        burnExtra:`<path d="M12 3c3 4-1 5 3 8 1-3 4-2 4 2 0 5-3 8-7 8s-7-3-7-8c0-3 2-6 5-9-1 4 1 5 2 7 2-2-1-4 0-8z" fill="#f5f5f2" stroke="#333" stroke-width="1.5"/><path d="M12 14c2 2 1 5-1 6 4 0 5-5 1-6z" fill="#d2a449"/>`,
        draw:`<path d="M4 14l8-8 8 8h-5v5H9v-5z" fill="#f4f4f4" stroke="#2b2b2b" stroke-width="2"/><path d="M6 20h12" stroke="#2b2b2b" stroke-width="2"/>`,
        refresh:`<circle cx="12" cy="12" r="9" fill="#e8ece7" stroke="#5b6360" stroke-width="1.5"/><path d="M6 12h10" stroke="#66a74e" stroke-width="4" stroke-linecap="round"/><path d="M14 7l5 5-5 5z" fill="#222"/>`,
        trash:`<path d="M4 16l5-5-5-5 4-4 5 5 5-5 4 4-5 5 5 5-4 4-5-5-5 5z" fill="#d72f36" stroke="#fff" stroke-width="2"/><path d="M3 21h18" stroke="#333" stroke-width="2"/>`,
        dominance:`<path d="M12 3l8 8h-5v10H9V11H4z" fill="#4aa3d8" stroke="#1f5d82" stroke-width="1.7"/>`,
        defender:`<path d="M12 3l8 4v5c0 5-3 8-8 10-5-2-8-5-8-10V7z" fill="#6f8f58" stroke="#324529" stroke-width="1.7"/>`,
        slash:`<path d="M3 21L21 3" stroke="#842b2b" stroke-width="4" stroke-linecap="round"/><path d="M5 5h5v5H5zM14 14h5v5h-5z" fill="#eadcb1" stroke="#6b5940"/>`,
        burn:`<path d="M12 4c4 5-2 6 3 10 1-3 4-2 4 2 0 4-3 6-7 6s-7-2-7-6c0-3 2-6 5-10-1 4 1 6 2 8 2-3-1-5 0-10z" fill="#3a3a3a" stroke="#111" stroke-width="1.5"/>`,
        atium:`<circle cx="12" cy="12" r="9" fill="#f1edda" stroke="#8e8a68" stroke-width="2"/><path d="M8 15c2-6 6-6 8 0M9 9h.1M15 9h.1" stroke="#4f4b35" stroke-width="2" fill="none"/>`
      };
      return `<span class="ico" title="${esc(title || kind)}"><svg viewBox="0 0 24 24" aria-hidden="true">${svgs[kind] || svgs.mission}</svg></span>`;
    }
    function cardArt(c){
      const metal = c.need || c.metal || (c.type === "funding" ? "Coin" : "Mist");
      const palettes = {
        Tin:["#d7dde5","#566879","#1d242b"], Pewter:["#d8d0c8","#80766d","#2c2927"],
        Bronze:["#c99455","#6e4327","#20130c"], Copper:["#cf7c4b","#743829","#24100c"],
        Zinc:["#d6cfd7","#7b607d","#271f2b"], Brass:["#ddbd63","#81651f","#211805"],
        Iron:["#b9c0c5","#58616a","#191d22"], Steel:["#d7e3ee","#4e6f91","#121c28"],
        Atium:["#f3f0df","#9e9a77","#242318"], Coin:["#e5c76b","#8b6a26","#241a08"], Mist:["#d7d7d1","#68706e","#171a1a"]
      };
      const p = palettes[metal] || palettes.Mist;
      const symbol = c.type === "ally" ? "ALIADO" : es(metal).toUpperCase();
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 150">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${p[0]}"/><stop offset=".55" stop-color="${p[1]}"/><stop offset="1" stop-color="${p[2]}"/></linearGradient>
          <filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="3"/><feColorMatrix type="saturate" values=".25"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
        </defs>
        <rect width="320" height="150" fill="url(#g)"/>
        <path d="M0 118 C55 87 94 143 145 111 S228 70 320 104 V150 H0Z" fill="rgba(0,0,0,.28)"/>
        <circle cx="244" cy="45" r="32" fill="rgba(255,255,255,.18)"/>
        <path d="M58 38 l28 54 l-56 0 z" fill="rgba(255,255,255,.28)" stroke="rgba(0,0,0,.25)" stroke-width="4"/>
        <path d="M126 28 h75 l-18 76 h-75 z" fill="rgba(0,0,0,.22)" stroke="rgba(255,255,255,.16)" stroke-width="5"/>
        <text x="160" y="128" text-anchor="middle" font-family="Segoe UI,Arial" font-size="14" font-weight="800" fill="rgba(255,255,255,.28)">${symbol}</text>
        <rect width="320" height="150" fill="transparent" filter="url(#n)" opacity=".35"/>
      </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }
    function characterArt(ch){
      const colors = {
        kelsier:["#f0c66b","#3b3427","#151515"],
        vin:["#b8d6f0","#27394b","#0d1118"],
        shan:["#d9b3d8","#4c2e55","#160d18"],
        marsh:["#c4c8c7","#49505a","#111315"]
      }[ch.id] || ["#ddd","#555","#111"];
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${colors[0]}"/><stop offset=".55" stop-color="${colors[1]}"/><stop offset="1" stop-color="${colors[2]}"/></linearGradient></defs>
        <rect width="120" height="120" fill="url(#g)"/>
        <circle cx="60" cy="36" r="19" fill="rgba(245,230,205,.75)"/>
        <path d="M22 112c8-33 68-33 76 0z" fill="rgba(12,12,13,.72)"/>
        <path d="M30 70c20 18 41 18 60 0" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="8"/>
        <text x="60" y="108" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="800" fill="#fff3cf">${ch.name.toUpperCase()}</text>
      </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }
    function renderActions(){
      if(!state){ return; }
      const p = activePlayer();
      $("actions").innerHTML = `
        <button onclick="buyBoxing()" ${!isMyTurn()||p.turn.coin<2?"disabled":""}>Comprar moneda guardada (2)</button>
        <button onclick="spendBoxing()" ${!isMyTurn()||p.boxings<1?"disabled":""}>Gastar moneda guardada (+1)</button>
        <div class="tiny">Preparar una carta no quema metal. Los botones Quemar, Forzar y Atium se bloquean si no puedes pagar el metal.</div>
        <div class="tiny">Reserva de metales de cartas: ${Object.entries(p.turn.metalPool).filter(x=>x[1]>0).map(x=>`${es(x[0])}:${x[1]}`).join(" ") || "ninguna"}</div>
        <div class="tiny">Pendiente: refrescar ${p.turn.refreshAny}, eliminar propia ${p.turn.trashOwn}, empujar mercado ${p.turn.trashMarket}, recuperar ${p.turn.pull}</div>`;
    }
    function resourceChips(p){
      return [
        ["coin", "Monedas", p.turn.coin],
        ["combat", "Combate", p.turn.combat],
        ["mission", "Misión", p.turn.mission],
        ["atium", "Atium", p.atium],
        ["coin", "Reserva", p.boxings]
      ].map(([kind,label,value]) => `
        <span class="resChip" title="${esc(label)}">
          ${icon(kind,label)}
          <span class="resValue">${value}</span>
          <span class="resLabel">${label}</span>
        </span>
      `).join("");
    }
    function effectSummary(eff={}){
      const parts = [];
      if(eff.coin) parts.push(`+${eff.coin} moneda${eff.coin>1?"s":""}`);
      if(eff.combat) parts.push(`+${eff.combat} combate`);
      if(eff.mission) parts.push(`+${eff.mission} misión`);
      if(eff.heal) parts.push(`+${eff.heal} vida`);
      if(eff.train) parts.push(`+${eff.train} entrenamiento`);
      if(eff.draw) parts.push(`roba ${eff.draw}`);
      if(eff.refreshAny) parts.push(`refresca ${eff.refreshAny}`);
      if(eff.trashOwn) parts.push(`elimina ${eff.trashOwn} propia`);
      if(eff.trashMarket) parts.push(`elimina ${eff.trashMarket} mercado`);
      if(eff.pull) parts.push(`recupera ${eff.pull}`);
      if(eff.atium) parts.push(`+${eff.atium} Atium`);
      if(eff.burn) parts.push(`+${eff.burn} quemar`);
      return parts.join(", ") || "sin recompensa";
    }
    function renderLegend(){
      $("legend").innerHTML = [
        ["train","entrenar"],["combat","combate"],["mission","misión"],["heal","curar"],
        ["coin","moneda"],["burnExtra","quemar +1"],["draw","robar"],["refresh","refrescar"],
        ["trash","eliminar"],["dominance","dominancia"],["burn","quemar"],["atium","atium"]
      ].map(([k,t]) => `<div style="display:flex;align-items:center;gap:6px;margin:4px 0">${icon(k,t)} <span>${t}</span></div>`).join("");
    }
    function esc(s){ return String(s ?? "").replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }

    $("joinBtn").onclick = join;
    $("newBtn").onclick = newGame;
    $("leaveBtn").onclick = leaveGame;
    $("startBtn").onclick = startGame;
    $("endTurnBtn").onclick = endTurn;
    $("helpBtn").onclick = () => window.open("rules.html", "_blank", "noopener");
    function renderChat(chat){
      $("chatlog").innerHTML = chat.map(m => `<div><span class="tiny">${esc(m.at)}</span> <b>${esc(m.name)}:</b> ${esc(m.text)}</div>`).join("");
      $("chatlog").scrollTop = $("chatlog").scrollHeight;
    }
    $("chatBtn").onclick = async () => {
      const t=$("chatInput").value.trim();
      if(!t || !room) return;
      await api(`/api/chat?room=${encodeURIComponent(room)}`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:localStorage.playerName || "Jugador", text:t})
      });
      $("chatInput").value="";
      poll();
    };
    window.addEventListener("load", () => {
      // Read URL params for pre-filled name/room (used when opening a local player tab)
      const params = new URLSearchParams(window.location.search);
      const urlNombre = params.get("nombre");
      const urlSala = params.get("sala");
      if(urlNombre) { $("nameInput").value = urlNombre; localStorage.playerName = urlNombre; }
      if(urlSala) { $("roomInput").value = urlSala; room = urlSala; localStorage.room = urlSala; }
      else { $("roomInput").value = room; }
      if(!urlNombre && localStorage.playerName) $("nameInput").value = localStorage.playerName;
      // Auto-join if came from a "añadir jugador" link
      if(urlNombre && urlSala) {
        join().catch(()=>{});
      }
      setInterval(poll, 900);
      poll();
    });
  </script>
</body>
</html>
